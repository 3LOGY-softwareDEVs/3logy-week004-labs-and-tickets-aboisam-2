<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="dashboard">
      <!-- Header -->
      <header class="dashboard_header">
        <h1 class="dashboard_title">Task <span>Dashboard</span></h1>
      </header>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-card_label">Total</span>
          <span class="stat-card_value" id="statTotal">0</span>
        </div>
        <div class="stat-card stat-card--accent">
          <span class="stat-card__label">Active</span>
          <span class="stat-card__value" id="statActive">0</span>
        </div>
        <div class="stat-card stat-card--low">
          <span class="stat-card__label">Completed</span>
          <span class="stat-card__value" id="statCompleted">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__label">Progress</span>
          <span class="stat-card__value" id="statPercent">0%</span>
          <div class="stat-card__bar">
            <div
              class="stat-card__bar-fill"
              id="statBar"
              style="width: 0%"></div>
          </div>
        </div>
      </div>

      <!-- Add Task Form -->
      <div class="task-form">
        <div class="task-form__row">
          <input
            type="text"
            id="taskInput"
            placeholder="What needs to be done?" />
          <select id="prioritySelect">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
          <button class="btn-add" id="addTaskBtn">+ Add Task</button>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <select class="sort-select" id="sortSelect">
          <option value="date-desc">Newest first</option>
          <option value="date-asc">Oldest first</option>
          <option value="priority">By Priority</option>
        </select>
        <span class="task-count" id="taskCount">Showing 0 of 0 tasks</span>
      </div>

      <!-- Task List -->
      <div class="task-list" id="taskList"></div>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
